{% extends 'students/base.html' %}

{% block content %}

    <h2 class="mb-5 ">Dashboard</h2>
    <div class="row">

        <div class="col-md-4">
            <div class="card p-5 text-white"style="background:linear-gradient(45deg,#2b6cb0,#3182ce);">
                <h5>Total Students</h5>
                <h2>{{students}}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-5 text-white"style="background:linear-gradient(45deg,#2f855a,#38a169);">
                <h5>Total Courses</h5>
                <h2>{{courses}}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-5 text-white"style="background:linear-gradient(45deg,#d69e2e,#ecc94b);">
                <h5>Total Enrollments</h5>
                <h2>{{enrollments}}</h2>
            </div>
        </div>
    </div>

{% endblock %}
