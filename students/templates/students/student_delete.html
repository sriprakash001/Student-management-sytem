<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends 'students/base.html' %}
    {% block content %}
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4>Update Student</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">
                        Are you sure you want to delete <strong>"{{ student_del.name }}"</strong>?
                </p>
                <form action="" method="POST">
                    {% csrf_token %}
                    <button type="submit"class="btn btn-danger">Yes, Delete</button> <a href="{% url 'students_list' %}" class="btn btn-primary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
    {% endblock %}
</body>
</html>
