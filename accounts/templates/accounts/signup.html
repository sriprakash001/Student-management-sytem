{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg border-0 p-4" style="width: 380px; border-radius: 15px;">
        
        <div class="text-center mb-1">
            <h3 class="fw-bold">Create Account</h3>
            <p class="text-muted">Signup to continue</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-2">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" class="form-control" placeholder="Enter your first name" required>
            </div>

            <div class="mb-2">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control" placeholder="Enter your last name" required>
            </div>

            <div class="mb-2">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            {% if error %}
            <div class="alert alert-danger text-center py-1">
                {{error}}
            </div>
            {% endif %}
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                Sign Up
            </button>

            <div class="text-center mt-3">
                <p class="mb-0">Already have an account?
                    <a href="{% url '/' %}" class="text-primary fw-bold">Login</a>
                </p>
            </div>

        </form>
    </div>
</div>

</body>
</html>
