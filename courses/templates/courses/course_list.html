<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends 'students/base.html' %}
    {% block content %}
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-bold">All Courses</h2>
            <a href="{% url 'course_create' %}" class="btn btn-success mb3"> + Add Course</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle text-center mt-4">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Code</th>
                                <th>Description</th>
                                <th>Update</th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        {% for i in all_courses %}
                        <tbody>
                            <tr>
                                <td>{{i.name}}</td>
                                <td>{{i.code}}</td>
                                <td>{{i.description}}</td>
                                <td>
                                    <a href="{% url 'course_update' i.id %}"class="btn btn-warning mb3">Edit</a>
                                    
                                </td>
                                <td>
                                    <a href="{% url 'course_delete' i.id %}"class="btn btn-danger mb3">Delete</a>
                                </td>
                            </tr>
                        {% empty %}
                            <tr>
                                <td colspan="7">No students found</td>
                            </tr>
                        </tbody>
                        {% endfor %}
                    </table>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}
</body>
</html>
